apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: ensemble
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      securityContext:
        fsGroup: 999  # ensures correct file permissions

      containers:
      - name: mongodb
        image: mongo:4.4.6

        ports:
        - containerPort: 27017

        # ✅ RESOURCE OPTIMIZATION
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"

        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: MONGO_INITDB_ROOT_USERNAME

        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: MONGO_INITDB_ROOT_PASSWORD

        - name: MONGO_INITDB_DATABASE
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: MONGO_INITDB_DATABASE

        # ⚠️ HEALTH CHECKS ADDED
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 15
          periodSeconds: 5

        volumeMounts:
        - name: shared-storage
          mountPath: /data/db
          subPath: mongodb

      volumes:
      - name: shared-storage
        persistentVolumeClaim:
          claimName: shared-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: ensemble
spec:
  ports:
  - port: 27017
    targetPort: 27017
  selector:
    app: mongodb