apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-eap
  namespace: ensemble
spec:
  replicas: 1

  #  Optimization: safer rollout
  strategy:
    type: RollingUpdate

  selector:
    matchLabels:
      app: redis-eap

  template:
    metadata:
      labels:
        app: redis-eap

    spec:
      securityContext:
        fsGroup: 999

      containers:
      - name: redis
        image: redis:7-alpine  #  Optimization: lightweight stable version

        ports:
        - containerPort: 6379

        volumeMounts:
        - name: shared-storage
          mountPath: /data
          subPath: redis

        #  Optimization: proper Redis health check (better than generic ping alone)
        livenessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 20
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 5

        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 15
          periodSeconds: 10

        #  Optimization: resource control (critical missing before)
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        #  Optimization: tuned Redis memory behavior
        command:
        - redis-server
        - "--appendonly"
        - "yes"
        - "--maxmemory"
        - "512mb"
        - "--maxmemory-policy"
        - "allkeys-lru"

      volumes:
      - name: shared-storage
        persistentVolumeClaim:
          claimName: shared-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: redis-eap
  namespace: ensemble
spec:
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: redis-eap